name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub Repository se code fetch karna
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Files ko Ubuntu server par securely copy karna (Alternative Stable Action)
      - name: Deploy to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"              # Poora code uthayega
          target: "/var/www/html"     # Nginx folder me daalega

      # 3. Nginx Server ko automatically reload karna
      - name: Reload Nginx Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx